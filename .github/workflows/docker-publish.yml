name: Docker Publish to GHCR

on:
  push:
    branches: [ main ] # Déclenche le workflow sur un push vers la branche 'main'
    # Si vous utilisez des tags pour la version, ajoutez : tags: [ 'v*.*.*' ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    # Permissions requises pour écrire (push) vers GHCR.
    permissions:
      contents: read
      packages: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      # Configure Docker CLI pour s'authentifier auprès de GHCR
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          # Utilise le jeton GitHub intégré pour l'authentification (plus sûr que le PAT)
          password: ${{ secrets.GITHUB_TOKEN }}

      # Définition des variables (Tags) pour l'image
      - name: Define Image Tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }} # ghcr.io/votre_user/votre_repo
          tags: |
            type=raw,value=latest
            type=sha,format=long,prefix=sha-

      # Construire et Pousser l'image Docker vers GHCR
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: . # Cherche le Dockerfile dans le répertoire racine
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
